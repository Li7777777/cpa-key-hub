<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CPA API 密钥分发</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="CPA API 密钥分发">
        <span class="brand-mark">C</span>
        <span>CPA Key Hub</span>
      </a>
      <nav class="nav-actions" aria-label="页面导航">
        <a class="ghost-link" href="/admin.html">管理端</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="workspace user-workspace" aria-labelledby="page-title">
        <div class="intro-panel">
          <p class="eyebrow">API Key Distribution</p>
          <h1 id="page-title">领取你的 CPA API 密钥</h1>
          <p class="lead">输入邀请码和昵称，系统会为你创建一枚可用于 CPA 代理服务认证的 API 密钥。</p>
          <div class="status-row" aria-label="领取状态">
            <span class="status-pill"><i data-lucide="shield-check"></i>服务端代创建</span>
            <span class="status-pill"><i data-lucide="eye-off"></i>密钥只显示一次</span>
          </div>
        </div>

        <form class="panel form-panel" id="create-key-form" novalidate>
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Create</p>
              <h2>创建 API 密钥</h2>
            </div>
            <span class="soft-badge" id="mode-badge">Checking</span>
          </div>

          <label class="field" for="cdk">
            <span>创建邀请码 CDK</span>
            <input id="cdk" name="cdk" autocomplete="one-time-code" placeholder="DEMO-CDK-001" />
            <small class="field-error" data-error-for="cdk"></small>
          </label>

          <label class="field" for="nickname">
            <span>用户昵称</span>
            <input id="nickname" name="nickname" autocomplete="nickname" maxlength="32" placeholder="例如：Team Alpha" />
            <small class="field-error" data-error-for="nickname"></small>
          </label>

          <button class="primary-button" type="submit">
            <i data-lucide="key-round"></i>
            <span>创建 API 密钥</span>
          </button>

          <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
